<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ford</title>    
    <link href="css/reset.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
    <script src="js/form.js"></script>
</head>
<body>
    <header>       
        <div>
            <img src="img/logo-ford-256.png" width="150" class="logo" />
        </div>
        <nav>
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="lancamento.html">Lançamento</a>
                </li>
                <li>
                    <a href="contato.html">Contato</a>
                </li>
            </ul>
        </nav>

    </header>
    <main>
        <div class="forms">
            <div>
                <img src="img/xls 2.2 diesel.jpg">
            </div>
            <div>
                <h2 class="titulo">Sobre Você</h2>

            <form onsubmit="event.preventDefault(); Post(this);">
                <input type="text" name="nome" placeholder="Usuário*" class="fordform" required>
                <input type="text" name="email" placeholder="E-mail*" class="fordform" required>
                <input type="text" name="telefone" placeholder="Telefone*" class="fordform" required>
                
                <select name="tipo_contato" class="fordform" required>
                    <option value="" disabled selected>Motivo do contato:*</option>
                    <option value="ELOGIO">Elogio</option>
                    <option value="RECLAMAÇÕES">Reclamações</option>
                    <option value="SUGESTÕES">Sugestões</option>
                </select>
                
                <textarea name="mensagem" placeholder="Escreva sua mensagem*" class="fordform" required></textarea>
                <div class="lgpd-container">
                <p class="lgpd-texto">
                    Os dados serão mantidos em nossa base de dados, somente enquanto for desejado por você. 
                    A qualquer momento, será possível editar ou remover tais dados. 
                    <a href="https://www.ford.com.br/politica-de-privacidade/" target="_blank" class="lgpd-link">Termos e Condições</a>
                </p>
                
                <div class="lgpd-linha">
                    <input type="checkbox" id="aceite-termos" required>
                    <label for="aceite-termos">Sim, li e concordo com os vossos termos.</label>
                </div>

                <div class="lgpd-linha">
                    <input type="checkbox" id="aceite-novidades">
                    <label for="aceite-novidades">Sim, também quero receber descontos e novidades da Ford.</label>
                </div>
            </div>
            
                <button type="submit">Enviar</button>
            </form>

            </div>
        </div>
    </main>
    <footer>
        <nav id="social">
            <ul>
                <li><span class="redesociais">Redes Sociais</span></li>
                <li><a href="#" title="Facebook"><img src="img/facebook-50.png"></a></li>
                <li><a href="#" title="YouTube"><img src="img/youtube-squared-50.png"></a></li>
                <li><a href="#" title="Instagram"><img src="img/instagram-logo-50.png"></a></li>
            </ul>
        </nav>
        <div>
           <img src="img/ford-96.png" width="70"  />
        </div>
    </footer>    
</body>
</html>
